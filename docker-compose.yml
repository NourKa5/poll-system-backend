version: "3.8"

services:
  user_db:
    image: mysql:8.0
    container_name: user_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: user_service_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - user_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  poll_db:
    image: mysql:8.0
    container_name: poll_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: poll_service_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - poll_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  user_service:
    build: ./user_service
    container_name: user_service
    restart: always
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: mysql+pymysql://user:password@user_db:3306/user_service_db
    depends_on:
      user_db:
        condition: service_healthy

  poll_service:
    build: ./poll_service
    container_name: poll_service
    restart: always
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: mysql+pymysql://user:password@poll_db:3306/poll_service_db
      USER_SERVICE_URL: http://user_service:8000
    depends_on:
      poll_db:
        condition: service_healthy
      user_service:
        condition: service_started

volumes:
  user_db_data:
  poll_db_data:
